<!doctype html>
<!--
  Composición base HyperFrames para video narrado OnMind (1080x1920, 9:16 Reels).

  Convenciones del proyecto:
  - Audio mezclado (voz + música) como track único, archivo `mezcla.mp3` en la raíz
  - duration: ajustar a duración del audio + 2-4s de tail visual
  - Paleta: teal #007056 (acento), #fafafa (fondo), #111 (texto base)
  - Tipografía: Inter (sans-serif del sistema)
  - Sin emojis: usar tipografía + accentos geométricos (barras, divisores, números)
  - Sin guion largo (—); usar coma o salto
  - Handle: @OnMindApp (NUNCA "CRM")

  Patrón de escenas:
  - Cada escena es un .scene con position absolute y opacity 0
  - GSAP timeline controla opacidad de la escena (showScene/hideScene helpers)
  - Dentro de cada escena, los elementos entran con .from() (NUNCA exits salvo escena final)
  - Datos clave (números) deben quedar visibles 2-3s post count-up
  - Combinar escenas relacionadas para que la data acumule (no se vaya rápido)

  Reemplazar TODOS los TODO antes de renderizar.
-->
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #fafafa;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        color: #111;
      }

      .scene {
        position: absolute;
        inset: 0;
        opacity: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 160px 90px;
        text-align: center;
      }

      .chip {
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 36px;
        font-weight: 600;
        color: #007056;
        background: #e7f4f0;
        padding: 14px 32px;
        border-radius: 999px;
        opacity: 0;
        z-index: 10;
        letter-spacing: 0.02em;
      }

      /* Big numbers (count-ups) */
      .pretitle {
        font-size: 44px;
        font-weight: 600;
        color: #555;
        margin-bottom: 36px;
        letter-spacing: -0.01em;
      }
      .big-num {
        font-size: 380px;
        font-weight: 900;
        color: #007056;
        font-variant-numeric: tabular-nums;
        line-height: 0.95;
        letter-spacing: -0.05em;
      }
      .post-label {
        font-size: 52px;
        font-weight: 600;
        color: #1a1a1a;
        margin-top: 36px;
        max-width: 920px;
        line-height: 1.2;
      }
      .post-label .muted { color: #555; font-weight: 500; }

      /* Outro handle */
      .outro-handle {
        font-size: 132px;
        font-weight: 800;
        color: #007056;
        letter-spacing: -0.025em;
      }
      .outro-tag {
        font-size: 56px;
        font-weight: 500;
        color: #444;
        margin-top: 30px;
        max-width: 880px;
        line-height: 1.25;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="38"
      data-width="1080"
      data-height="1920"
    >
      <audio
        id="audio-mezcla"
        data-start="0"
        data-duration="38"
        data-track-index="9"
        src="mezcla.mp3"
        data-volume="1"
      ></audio>

      <div id="chip" class="chip">@OnMindApp</div>

      <!-- TODO: Definir escenas según el guion -->
      <div class="scene" id="s1">
        <div class="big-num" id="s1-num">0</div>
        <div class="post-label" id="s1-label">TODO label</div>
      </div>

      <!-- Outro estándar (NO tocar el handle ni el tag salvo razón fuerte) -->
      <div class="scene" id="outro">
        <div class="outro-handle">@OnMindApp</div>
        <div class="outro-tag">automatizá el vínculo con tus clientes</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      function showScene(id, t, dur = 0.5) {
        tl.to("#" + id, { opacity: 1, duration: dur, ease: "power2.out" }, t);
      }
      function hideScene(id, t, dur = 0.4) {
        tl.to("#" + id, { opacity: 0, duration: dur, ease: "power2.in" }, t);
      }

      // Chip @OnMindApp
      tl.to("#chip", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.4);

      // TODO: Programar las escenas usando los timestamps de timestamps.json
      // Patrón típico para count-up:
      //   const c = { v: 0 };
      //   tl.to(c, { v: 745, duration: 1.8, ease: "power2.out",
      //     onUpdate() { document.getElementById("s1-num").textContent = Math.round(c.v); }
      //   }, 9.2);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
