<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #fefefe;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        color: #1a1a1a;
      }

      .clip {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
      }

      .scene-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 120px 90px;
        gap: 60px;
        box-sizing: border-box;
        text-align: center;
      }

      .intro-title {
        font-size: 96px;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.02em;
        max-width: 900px;
      }
      .intro-title .accent {
        color: #007056;
      }

      .step-num-circle {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: #007056;
        color: #fefefe;
        font-size: 110px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .step-emoji {
        font-size: 220px;
        line-height: 1;
      }

      .step-text {
        font-size: 84px;
        font-weight: 700;
        line-height: 1.15;
        max-width: 900px;
        letter-spacing: -0.01em;
      }

      .count-num {
        font-size: 360px;
        font-weight: 900;
        color: #007056;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        letter-spacing: -0.04em;
      }
      .count-label {
        font-size: 60px;
        font-weight: 600;
        color: #1a1a1a;
        max-width: 900px;
      }

      .outro-handle {
        font-size: 140px;
        font-weight: 800;
        color: #007056;
        letter-spacing: -0.02em;
      }
      .outro-tag {
        font-size: 52px;
        font-weight: 500;
        color: #555;
        max-width: 880px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="16"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="intro"
        class="clip"
        data-start="0"
        data-duration="2.4"
        data-track-index="0"
      >
        <div class="scene-content">
          <div class="intro-title" id="intro-title">
            Cómo <span class="accent">OnMind</span> mantiene vivo el vínculo con
            tus clientes
          </div>
        </div>
      </div>

      <div
        id="paso1"
        class="clip"
        data-start="2.4"
        data-duration="2.8"
        data-track-index="0"
      >
        <div class="scene-content">
          <div class="step-num-circle" id="p1-num">1</div>
          <div class="step-emoji" id="p1-emoji">📝</div>
          <div class="step-text" id="p1-text">Configurás tus plantillas</div>
        </div>
      </div>

      <div
        id="paso2"
        class="clip"
        data-start="5.2"
        data-duration="2.8"
        data-track-index="0"
      >
        <div class="scene-content">
          <div class="step-num-circle" id="p2-num">2</div>
          <div class="step-emoji" id="p2-emoji">🏷️</div>
          <div class="step-text" id="p2-text">
            Configurás categorías para tus contactos
          </div>
        </div>
      </div>

      <div
        id="paso3"
        class="clip"
        data-start="8.0"
        data-duration="3.4"
        data-track-index="0"
      >
        <div class="scene-content">
          <div class="step-num-circle" id="p3-num">3</div>
          <div class="count-num" id="p3-count">0</div>
          <div class="count-label" id="p3-label">
            mensajes generados al año
          </div>
        </div>
      </div>

      <div
        id="paso4"
        class="clip"
        data-start="11.4"
        data-duration="2.8"
        data-track-index="0"
      >
        <div class="scene-content">
          <div class="step-num-circle" id="p4-num">4</div>
          <div class="step-emoji" id="p4-emoji">💬</div>
          <div class="step-text" id="p4-text">
            Tu cliente recibe el mimo justo
          </div>
        </div>
      </div>

      <div
        id="outro"
        class="clip"
        data-start="14.2"
        data-duration="1.8"
        data-track-index="0"
      >
        <div class="scene-content">
          <div class="outro-handle" id="outro-handle">@OnMindApp</div>
          <div class="outro-tag" id="outro-tag">
            automatizá el vínculo con tus clientes
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from(
        "#intro-title",
        { opacity: 0, y: 60, duration: 0.8, ease: "power3.out" },
        0.2,
      );

      tl.from(
        "#p1-num",
        { opacity: 0, scale: 0.4, duration: 0.5, ease: "back.out(2)" },
        2.5,
      );
      tl.from(
        "#p1-emoji",
        { opacity: 0, y: 40, duration: 0.5, ease: "power2.out" },
        2.8,
      );
      tl.from(
        "#p1-text",
        { opacity: 0, y: 30, duration: 0.5, ease: "power3.out" },
        3.1,
      );

      tl.from(
        "#p2-num",
        { opacity: 0, scale: 0.4, duration: 0.5, ease: "back.out(2)" },
        5.3,
      );
      tl.from(
        "#p2-emoji",
        { opacity: 0, y: 40, duration: 0.5, ease: "power2.out" },
        5.6,
      );
      tl.from(
        "#p2-text",
        { opacity: 0, y: 30, duration: 0.5, ease: "power3.out" },
        5.9,
      );

      tl.from(
        "#p3-num",
        { opacity: 0, scale: 0.4, duration: 0.5, ease: "back.out(2)" },
        8.1,
      );
      tl.from(
        "#p3-count",
        { opacity: 0, scale: 0.7, duration: 0.4, ease: "power2.out" },
        8.4,
      );
      tl.from(
        "#p3-label",
        { opacity: 0, y: 20, duration: 0.4, ease: "power2.out" },
        8.6,
      );

      const counter = { val: 0 };
      tl.to(
        counter,
        {
          val: 365,
          duration: 2.0,
          ease: "power2.out",
          onUpdate: function () {
            const el = document.getElementById("p3-count");
            if (el) el.textContent = Math.round(counter.val);
          },
        },
        8.7,
      );

      tl.from(
        "#p4-num",
        { opacity: 0, scale: 0.4, duration: 0.5, ease: "back.out(2)" },
        11.5,
      );
      tl.from(
        "#p4-emoji",
        { opacity: 0, y: 40, duration: 0.5, ease: "power2.out" },
        11.8,
      );
      tl.from(
        "#p4-text",
        { opacity: 0, y: 30, duration: 0.5, ease: "power3.out" },
        12.1,
      );

      tl.from(
        "#outro-handle",
        {
          opacity: 0,
          scale: 0.85,
          y: 30,
          duration: 0.6,
          ease: "back.out(1.5)",
        },
        14.3,
      );
      tl.from(
        "#outro-tag",
        { opacity: 0, y: 20, duration: 0.5, ease: "power2.out" },
        14.7,
      );
      tl.to(
        ["#outro-handle", "#outro-tag"],
        { opacity: 0, duration: 0.4, ease: "power2.in" },
        15.6,
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
